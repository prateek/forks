name: engine-ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  engine-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: engine/go.mod
      - name: go test
        run: go -C engine test ./...

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: actionlint
        run: |
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          # self-hosted Tartelet labels are unknown to actionlint by design
          ./actionlint -ignore 'label ".*" is unknown'
